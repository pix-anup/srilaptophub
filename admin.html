<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>एडवांस्ड एडमिन पैनल - श्री लैपटॉप हब</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 p-6">

    <div id="passwordGate" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-2xl shadow-xl border text-center">
        <h2 class="text-2xl font-bold text-gray-800 mb-4">🔐 एडमिन लॉगिन</h2>
        <input type="password" id="adminPasswordInput" placeholder="पासवर्ड यहाँ लिखें..." class="w-full border p-3 rounded-xl mb-4 text-center text-lg tracking-widest focus:outline-blue-500">
        <button onclick="checkPassword()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-blue-700 transition">लॉगिन करें</button>
        <p id="loginError" class="text-red-500 text-sm mt-3 hidden">❌ गलत पासवर्ड!</p>
    </div>

    <div id="adminDashboard" class="max-w-4xl mx-auto hidden">
        <div class="flex justify-between items-center mb-8 bg-blue-900 p-4 rounded-xl shadow text-white">
            <h1 class="text-2xl font-bold">💻 Sri Laptop Hub - कंट्रोल रूम</h1>
            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-3 py-1.5 rounded-lg text-xs font-bold transition">Log Out</button>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-md mb-8 border">
            <h2 class="text-lg font-bold mb-4 text-gray-700 border-b pb-2">➕ नया लैपटॉप स्टॉक में जोड़ें (मल्टी-इमेज के साथ)</h2>
            <form id="laptopForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                
                <div class="flex flex-col">
                    <label class="text-sm font-semibold text-gray-600 mb-1">कंपनी / ब्रांड चुनें</label>
                    <select id="laptopBrand" class="border p-3 rounded-xl focus:outline-blue-500 bg-white" required>
                        <option value="">-- ब्रांड चुनें --</option>
                        <option value="HP">HP</option>
                        <option value="Dell">Dell</option>
                        <option value="Lenovo">Lenovo</option>
                        <option value="Asus">Asus</option>
                        <option value="Acer">Acer</option>
                        <option value="Apple">Apple (MacBook)</option>
                    </select>
                </div>

                <div class="flex flex-col">
                    <label class="text-sm font-semibold text-gray-600 mb-1">모델 का नाम</label>
                    <input type="text" id="laptopModel" placeholder="e.g. Pavilion 15" class="border p-3 rounded-xl focus:outline-blue-500" required>
                </div>

                <div class="flex flex-col">
                    <label class="text-sm font-semibold text-gray-600 mb-1">रैम (RAM)</label>
                    <select id="laptopRam" class="border p-3 rounded-xl focus:outline-blue-500 bg-white" required>
                        <option value="4GB RAM">4GB RAM</option>
                        <option value="8GB RAM" selected>8GB RAM</option>
                        <option value="16GB RAM">16GB RAM</option>
                        <option value="32GB RAM">32GB RAM</option>
                    </select>
                </div>

                <div class="flex flex-col">
                    <label class="text-sm font-semibold text-gray-600 mb-1">प्रोसेसर / जनरेशन</label>
                    <select id="laptopGen" class="border p-3 rounded-xl focus:outline-blue-500 bg-white" required>
                        <option value="Core i3 (11th Gen)">Core i3 (11th Gen)</option>
                        <option value="Core i5 (11th Gen)">Core i5 (11th Gen)</option>
                        <option value="Core i5 (12th Gen)" selected>Core i5 (12th Gen)</option>
                        <option value="Core i7 (12th Gen)">Core i7 (12th Gen)</option>
                        <option value="Ryzen 5 (5000 Series)">Ryzen 5 (5000 Series)</option>
                        <option value="Apple M1 Chip">Apple M1 Chip</option>
                    </select>
                </div>

                <div class="flex flex-col">
                    <label class="text-sm font-semibold text-gray-600 mb-1">स्टोरेज (Storage)</label>
                    <select id="laptopStorage" class="border p-3 rounded-xl focus:outline-blue-500 bg-white" required>
                        <option value="256GB NVMe SSD">256GB NVMe SSD</option>
                        <option value="512GB NVMe SSD" selected>512GB NVMe SSD</option>
                        <option value="1TB NVMe SSD">1TB NVMe SSD</option>
                    </select>
                </div>

                <div class="flex flex-col">
                    <label class="text-sm font-semibold text-gray-600 mb-1">कीमत (सिर्फ नंबर)</label>
                    <input type="number" id="laptopPrice" placeholder="e.g. 45000" class="border p-3 rounded-xl focus:outline-blue-500" required>
                </div>

                <div class="flex flex-col md:col-span-2 border-t pt-4 mt-2">
                    <label class="text-sm font-bold text-gray-700 mb-2">📸 लैपटॉप इमेजेस के डायरेक्ट लिंक (Postimages या ImgBB से लें)</label>
                    <input type="text" id="laptopImage1" placeholder="इमेज लिंक 1 (मुख्य फोटो - ज़रूरी)" class="border p-3 rounded-xl focus:outline-blue-500 mb-2" required>
                    <input type="text" id="laptopImage2" placeholder="इमेज लिंक 2 (वैकल्पिक / Optional)" class="border p-3 rounded-xl focus:outline-blue-500 mb-2">
                    <input type="text" id="laptopImage3" placeholder="इमेज लिंक 3 (वैकल्पिक / Optional)" class="border p-3 rounded-xl focus:outline-blue-500">
                </div>
                
                <button type="submit" class="bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-blue-700 transition md:col-span-2 shadow-lg mt-2">दुकान पर लाइव लिस्ट करें</button>
            </form>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-md border">
            <h2 class="text-lg font-bold mb-4 text-gray-700 border-b pb-2">📦 वर्तमान स्टॉक और Management</h2>
            <div id="adminLaptopList" class="space-y-4 mt-4">
                <p class="text-gray-500">स्टॉक लोड हो रहा है...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCt5HjbONwOZJ0q4yPgsqkYjep03cdwZO",
            authDomain: "srilaptophub.firebaseapp.com",
            projectId: "srilaptophub",
            storageBucket: "srilaptophub.firebasestorage.app",
            messagingSenderId: "844461823515",
            appId: "1:844461823515:web:f56f711a74b360f6618abe",
            measurementId: "G-3Z1CD5QDVG"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const SECRET_PASSWORD = "Sri@2026";

        window.checkPassword = () => {
            const entered = document.getElementById('adminPasswordInput').value;
            if(entered === SECRET_PASSWORD) {
                document.getElementById('passwordGate').classList.add('hidden');
                document.getElementById('adminDashboard').classList.remove('hidden');
                localStorage.setItem('adminLoggedIn', 'true');
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        };

        window.logout = () => {
            localStorage.removeItem('adminLoggedIn');
            location.reload();
        };

        if(localStorage.getItem('adminLoggedIn') === 'true') {
            document.getElementById('passwordGate').classList.add('hidden');
            document.getElementById('adminDashboard').classList.remove('hidden');
        }

        const form = document.getElementById('laptopForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const brand = document.getElementById('laptopBrand').value;
            const model = document.getElementById('laptopModel').value;
            const ram = document.getElementById('laptopRam').value;
            const gen = document.getElementById('laptopGen').value;
            const storage = document.getElementById('laptopStorage').value;
            const price = document.getElementById('laptopPrice').value;

            // तीनों इमेज लिंक्स को इकट्ठा करना
            const img1 = document.getElementById('laptopImage1').value;
            const img2 = document.getElementById('laptopImage2').value || "";
            const img3 = document.getElementById('laptopImage3').value || "";

            // खाली लिंक्स को हटाकर सिर्फ वैलिड लिंक्स की एक एरे (Array) बनाना
            const imagesArray = [img1, img2, img3].filter(url => url.trim() !== "");

            try {
                await addDoc(collection(db, "laptops"), {
                    name: `${brand} ${model}`,
                    price: price,
                    specs: `${gen} | ${ram} | ${storage}`,
                    images: imagesArray, // डेटाबेस में एरे के रूप में जाएगा
                    date: new Date()
                });
                alert("सफलतापूर्वक लिस्ट हो गया!");
                form.reset();
            } catch (error) {
                alert("त्रुटि: " + error.message);
            }
        });

        const listContainer = document.getElementById('adminLaptopList');
        onSnapshot(collection(db, "laptops"), (snapshot) => {
            listContainer.innerHTML = "";
            if(snapshot.size === 0) {
                listContainer.innerHTML = `<p class="text-gray-500 p-4 text-center">दुकान में कोई लैपटॉप नहीं है।</p>`;
                return;
            }
            snapshot.forEach((docData) => {
                const laptop = docData.data();
                const id = docData.id;

                listContainer.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-50 p-4 rounded-xl border">
                        <div>
                            <h3 class="font-bold text-gray-800">${laptop.name}</h3>
                            <p class="text-xs text-gray-500">₹${Number(laptop.price).toLocaleString('en-IN')}</p>
                        </div>
                        <button onclick="deleteLaptop('${id}')" class="bg-red-500 text-white px-4 py-1.5 rounded-xl text-xs font-bold hover:bg-red-600 transition">Delete</button>
                    </div>
                `;
            });
        });

        window.deleteLaptop = async (id) => {
            if(confirm("क्या यह लैपटॉप स्टॉक से हटाना चाहते हैं?")) {
                await deleteDoc(doc(db, "laptops", id));
            }
        };
    </script>
</body>
</html>
